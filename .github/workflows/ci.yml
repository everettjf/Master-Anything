name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install --quiet pytest # Python Apply/Create integration tests

      - run: pnpm install --frozen-lockfile

      - name: Build all packages (typecheck)
        run: pnpm -r build

      - name: Test
        run: pnpm test
