    <text x="392" y="406" font-size="14.5" font-weight="700" fill="#3fb950">✓ Mastered (Apply) — tests pass</text>
    <text x="392" y="430" font-size="12.5" fill="#8b949e" font-family="monospace"># pass 4, # fail 0 · 12ms · level 3</text>

