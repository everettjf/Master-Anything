      <text x="388" y="660" fill="#7ee2a8">☑ average</text>
      <rect x="564" y="640" width="230" height="30" rx="7" fill="#16241a" stroke="#3fb950" stroke-opacity="0.5"/>
      <text x="580" y="660" fill="#7ee2a8">☑ Using the Calculator</text>
      <rect x="806" y="640" width="150" height="30" rx="7" fill="#0d1117" stroke="#2a313c"/>
      <text x="822" y="660" fill="#8b949e">☐ Coordinate</text>
    </g>
    <text x="372" y="700" font-size="13" font-weight="700" fill="#3fb950">✓ Mastered (Analyze) — matches the graph · level 4</text>
  </g>
  <rect x="0.5" y="0.5" width="1279" height="799" rx="16" fill="none" stroke="#2a313c"/>
