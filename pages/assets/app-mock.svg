    <text x="372" y="176" font-size="14.5" fill="#d6dde6">Reimplement `add` so the project's tests pass.</text>
    <text x="372" y="198" font-size="12.5" fill="#8b949e">calc.py:5-6 · <tspan fill="#3fb950">✓ test-verified</tspan></text>

