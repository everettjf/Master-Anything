        <text x="34" y="22" fill="#d6dde6" font-weight="600">average</text>
        <text x="34" y="37" font-size="10.5" fill="#8b949e">def average(nums):</text>
        <rect x="188" y="13" width="64" height="20" rx="10" fill="#a371f7"/>
        <text x="220" y="27" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0d1117">Analyze</text>
      </g>
      <g transform="translate(24,444)">
        <rect width="264" height="44" rx="9" fill="#0d1117" stroke="#2a313c"/>
        <text x="16" y="27" font-size="11" fill="#8b949e">3</text>
        <text x="34" y="22" fill="#d6dde6" font-weight="600">Using Calculator</text>
        <text x="34" y="37" font-size="10.5" fill="#8b949e">section · README.md</text>
        <rect x="180" y="13" width="72" height="20" rx="10" fill="#58a6ff"/>
        <text x="216" y="27" text-anchor="middle" font-size="10" font-weight="700" fill="#0d1117">Understand</text>
      </g>
      <g transform="translate(24,496)">
        <rect width="264" height="44" rx="9" fill="#0d1117" stroke="#2a313c"/>
        <text x="16" y="27" font-size="11" fill="#8b949e">4</text>
        <text x="34" y="22" fill="#d6dde6" font-weight="600">Averages</text>
        <text x="34" y="37" font-size="10.5" fill="#8b949e">section · README.md</text>
        <rect x="196" y="13" width="56" height="20" rx="10" fill="#30363d"/>
        <text x="224" y="27" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8b949e">None</text>
