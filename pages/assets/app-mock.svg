    <text x="58" y="91" font-size="16" font-weight="700" fill="#d6dde6">Master<tspan fill="#58a6ff">-Anything</tspan></text>
    <text x="24" y="116" font-size="12" fill="#8b949e">Master anything, verifiably.</text>

