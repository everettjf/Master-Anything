    <rect x="0" y="46" width="312" height="754" fill="#161b22"/>
    <line x1="312" y1="46" x2="312" y2="800" stroke="#2a313c"/>

    <rect x="24" y="74" width="24" height="24" rx="7" fill="url(#logo)"/>
