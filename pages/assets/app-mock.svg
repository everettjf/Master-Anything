    <text x="264" y="154" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">Map</text>

    <text x="24" y="190" font-size="12.5" fill="#8b949e">domain: <tspan fill="#58a6ff" font-weight="700">mixed</tspan></text>

