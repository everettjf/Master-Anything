      <stop offset="0" stop-color="#58a6ff"/><stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
    <clipPath id="round"><rect width="1280" height="800" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
