      <text x="124" y="243" font-size="10" fill="#8b949e">nodes</text>
      <rect x="200" y="204" width="88" height="48" rx="8" fill="#0d1117" stroke="#2a313c"/>
      <text x="212" y="228" font-size="17" font-weight="700" fill="#d6dde6">6</text>
      <text x="212" y="243" font-size="10" fill="#8b949e">units</text>
