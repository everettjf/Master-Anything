    <line x1="372" y1="486" x2="1220" y2="486" stroke="#2a313c" stroke-dasharray="4 4"/>
    <text x="372" y="516" font-size="14" font-weight="700" fill="#58a6ff">Understand challenge · LLM-graded vs source</text>
    <rect x="372" y="528" width="170" height="32" rx="8" fill="#0d1117" stroke="#2a313c"/>
    <text x="457" y="549" text-anchor="middle" font-size="12.5" fill="#c9d1d9">Ask me a question</text>

    <text x="372" y="600" font-size="14" font-weight="700" fill="#a371f7">Analyze challenge · graph-verified</text>
    <text x="372" y="626" font-size="13" fill="#8b949e">If you change `Calculator`, which units are directly affected?</text>
    <g font-size="12.5">
