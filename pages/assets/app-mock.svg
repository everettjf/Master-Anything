    <rect x="372" y="212" width="848" height="96" rx="8" fill="#0d1117" stroke="#2a313c"/>
    <g font-family="monospace" font-size="14.5">
      <text x="388" y="240" fill="#ff7b72">def <tspan fill="#d2a8ff">add</tspan><tspan fill="#c9d1d9">(self, a, b):</tspan></text>
      <text x="388" y="266" fill="#ff7b72" xml:space="preserve">    return <tspan fill="#c9d1d9">a + b</tspan></text>
    </g>

    <!-- run button + target -->
    <rect x="372" y="324" width="120" height="36" rx="9" fill="#58a6ff"/>
    <text x="432" y="347" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0d1117">Run tests</text>
    <text x="508" y="347" font-size="12.5" fill="#8b949e">Target: <tspan fill="#d6dde6" font-weight="700">Apply</tspan></text>

